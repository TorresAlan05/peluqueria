<div class="container">
  <div class="form-box">
    <h2>Registrarse</h2>

<form (ngSubmit)="ClickRegistros()">
  <input type="email" [(ngModel)]="miRegistro.mail" name="mail" placeholder="Email" required>
  <input type="password" [(ngModel)]="miRegistro.contra" name="contra" placeholder="Contraseña" required>
  <input type="password" [(ngModel)]="miRegistro.contra2" name="contra2" placeholder="Repetir contraseña" required>

  <button type="submit">Registrarse</button>
</form>

    <p>¿Ya tenés cuenta? <a routerLink="/login">Iniciar sesión</a></p>
  </div>
</div>

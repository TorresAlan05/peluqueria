<div class="container">
  <div class="form-box">
    <h2>Login</h2>

    <form (ngSubmit)="login()">
      <input type="email" [(ngModel)]="miLogin.mail" name="mail" placeholder="Email" required>
      <input type="password" [(ngModel)]="miLogin.contra" name="contra" placeholder="Contraseña" required>

      <button type="submit">Ingresar</button>
    </form>

    <p>¿No tenés cuenta? <a routerLink="/registro">Registrarse</a></p>
  </div>
</div>

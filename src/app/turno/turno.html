<div class="container">
  <div class="form-box">
  
  <form (ngSubmit)="registrarTurno()">
    
    
      <h2>Registrar Nuevo Turno</h2>
      
      <input type="text" [(ngModel)]="nuevoTurno.nombre" name="nombre" placeholder="Nombre">
  
      <input type="text" [(ngModel)]="nuevoTurno.apellido" name="apellido" placeholder="Apellido">

      
      <input type="time" [(ngModel)]="nuevoTurno.hora" name="hora">
   
      
      <input type="date" [(ngModel)]="nuevoTurno.dia" name="dia" placeholder="Dia">
    

    <button type="submit">Generar y Descargar JSON</button>
  </form>
  </div>
</div>

<div class="container">
  <div class="form-box turnos-container">
    
    <div class="header-acciones" style="text-align: right; margin-bottom: 15px;">
      <button (click)="cerrarSesion()" class="btn-logout" style="background-color: #dc3545; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer;">
        Cerrar Sesión
      </button>
    </div>

    <h2>Turnos Agendados</h2>

    <div *ngIf="listaTurnos.length === 0" class="sin-turnos">
      <p>No hay turnos reservados por el momento.</p>
      <a routerLink="/turno" class="btn-link">Sacar un turno aquí</a>
    </div>

    <div *ngIf="listaTurnos.length > 0" class="lista-turnos">
      <div *ngFor="let turno of listaTurnos; let i = index" class="turno-item">
        
        <div *ngIf="indiceEditando === i; else vistaNormal" class="turno-edicion-form">
          <h3>Modificando turno de {{ turno.nombre }}</h3>
          
          <div class="campo-edicion">
            <label>Servicio:</label>
            <select [(ngModel)]="turnoEditado.servicio" class="select-edicion">
              <option *ngFor="let s of listaServicios" [value]="s">{{ s }}</option>
            </select>
          </div>

          <div class="campo-edicion">
            <label>Día:</label>
            <select [(ngModel)]="turnoEditado.dia" class="select-edicion">
              <option *ngFor="let d of listaDias" [value]="d">{{ d }}</option>
            </select>
          </div>

          <div class="campo-edicion">
            <label>Hora:</label>
            <select [(ngModel)]="turnoEditado.hora" class="select-edicion">
              <option *ngFor="let h of listaHoras" [value]="h">{{ h }} hs</option>
            </select>
          </div>

          <div class="turno-acciones">
            <button (click)="guardarEdicion(i)" class="btn-guardar">💾 Guardar</button>
            <button (click)="cancelarEdicion()" class="btn-cancelar">❌ Cancelar</button>
          </div>
        </div>
        
        <ng-template #vistaNormal>
          <div class="turno-info">
            <h3>{{ turno.nombre }} {{ turno.apellido }}</h3>
            <p class="servicio-tag">{{ turno.servicio }}</p>
            <p class="fecha-hora">📅 {{ turno.dia }} - ⏰ {{ turno.hora }} hs</p>
            <p *ngIf="turno.observaciones" class="obs">📝 <em>{{ turno.observaciones }}</em></p>
          </div>
          
          <div class="turno-acciones">
            <button (click)="habilitarEdicion(i)" class="btn-editar">✏️ Editar</button>
            <button (click)="eliminarTurno(i)" class="btn-eliminar">❌ Eliminar</button>
          </div>
        </ng-template>
      </div>

      <button (click)="borrarTodosLosTurnos()" class="btn-borrar">Vaciar Agenda</button>
    </div>

    <p><a routerLink="/turno">← Volver al formulario</a></p>
  </div>
</div>
